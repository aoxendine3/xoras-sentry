name: 'XORAS Sentry Guard'
description: 'Sovereign environment variable auditing and structural secret detection.'
inputs:
  target_path:
    description: 'The directory to scan'
    required: false
    default: '.'
  fail_on_secrets:
    description: 'Whether to fail the build if secrets are detected'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Run XORAS Scan
      run: npx xoras-sentry-cli ${{ inputs.target_path }}
      shell: bash
